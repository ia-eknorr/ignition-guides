name: Markdown Lint

on:
  pull_request:
    branches: [main]

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          config: .lint/.markdownlint.json
          globs: "docs/**/*.md"
